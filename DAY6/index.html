<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Products API</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container py-5">

<h1 class="text-center mb-4">Products Directory</h1>

<input type="text" class="form-control mb-4" id="search" placeholder="Search Product">

<div id="loading" class="text-center fs-4">
Loading Products...
</div>

<div id="error" class="text-danger text-center"></div>

<div class="text-center mb-3">
Total Products :
<span class="badge bg-primary" id="count"></span>
</div>

<div class="row" id="productContainer"></div>

</div>

<script src="script.js"></script>

</body>
</html>
